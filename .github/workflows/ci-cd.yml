name: CI/CD Pipeline – InfraFlow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 : Lint
  # ─────────────────────────────────────────────
  lint-and-test:
    name: Lint (Dockerfile, YAML, Bash)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Dockerfiles with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api-service/Dockerfile
          failure-threshold: error

      - name: Lint web-service Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: web-service/Dockerfile
          failure-threshold: error

      - name: Lint YAML files
        run: |
          pip install --quiet yamllint
          yamllint -d "{extends: default, rules: {line-length: {max: 150}}}" \
            docker-compose.yml k8s/

      - name: Lint Bash scripts with ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          severity: error

  # ─────────────────────────────────────────────
  # JOB 2 : Build
  # ─────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-test
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_short }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract short SHA
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build api-service image
        uses: docker/build-push-action@v5
        with:
          context: ./api-service
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/api-service:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/api-service.tar

      - name: Build web-service image
        uses: docker/build-push-action@v5
        with:
          context: ./web-service
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/web-service:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/web-service.tar

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/*.tar
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 3 : Security Scan
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load Docker images
        run: |
          docker load --input /tmp/api-service.tar
          docker load --input /tmp/web-service.tar

      - name: Extract short SHA
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Scan api-service with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/api-service:${{ steps.meta.outputs.sha_short }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL

      - name: Scan web-service with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/web-service:${{ steps.meta.outputs.sha_short }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL

      - name: Scan api-service – SARIF report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/api-service:${{ steps.meta.outputs.sha_short }}
          format: sarif
          output: trivy-api-service.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-api-service.sarif

  # ─────────────────────────────────────────────
  # JOB 4 : Push (main branch only)
  # ─────────────────────────────────────────────
  push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Push api-service to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./api-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/api-service:${{ steps.meta.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/api-service:stable
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push web-service to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./web-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/web-service:${{ steps.meta.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/web-service:stable
          cache-from: type=gha
          cache-to: type=gha,mode=max
