worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 512;
}

http {
    default_type application/json;
    access_log /var/log/nginx/access.log;
    sendfile on;
    keepalive_timeout 65;
    client_body_temp_path /tmp/client_body;
    proxy_temp_path /tmp/proxy;
    fastcgi_temp_path /tmp/fastcgi;
    uwsgi_temp_path /tmp/uwsgi;
    scgi_temp_path /tmp/scgi;

    server {
        listen 8080;
        server_name _;

        location /get {
            return 200 '{"service":"api-service","method":"GET","status":"ok","url":"/get"}';
            add_header Content-Type application/json;
        }

        location /post {
            return 200 '{"service":"api-service","method":"POST","status":"ok","url":"/post"}';
            add_header Content-Type application/json;
        }

        location /status {
            return 200 '{"status":"ok","service":"api-service"}';
            add_header Content-Type application/json;
        }

        location / {
            return 200 '{"service":"api-service","status":"ok","endpoints":["/get","/post","/status"]}';
            add_header Content-Type application/json;
        }
    }
}
